<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Stok Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      transition: background 0.5s, color 0.5s;
    }
    .light-mode {
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      color: #1e293b;
    }
    .dark-mode {
      background: radial-gradient(circle at top left, #0f172a, #1e293b);
      color: #f1f5f9;
    }
    .menu-tile {
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: bold;
      color: #fff;
    }
    .menu-tile:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #0ff, 0 0 30px #0ff;
    }
    iframe {
      border: 10px solid #333;
      border-radius: 20px;
      width: 95%;
      height: 80vh;
      background: #fff;
    }
    #topBar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0.5rem 1rem;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
    }
    #topBar button {
      margin: 0 10px;
      transition: transform 0.3s;
      font-size: 1.5rem;
      color: #fff;
    }
    #topBar button:hover {
      transform: rotate(10deg) scale(1.2);
    }
    #loading {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body class="dark-mode">
  <!-- Üst Bar -->
  <div id="topBar">
    <button onclick="goHome()">🏠 Ana Sayfa</button>
    <button onclick="toggleMode()">🌞/🌙</button>
  </div>

  <!-- Ana Menü -->
  <div id="mainMenu" class="animate__animated animate__fadeIn h-screen flex flex-col justify-center items-center gap-6">
    <h1 class="text-2xl font-bold mb-4">Hoş geldin!</h1>
    <p class="mb-4">Kullanma Talimatı: Menüden seçim yap, tabloyu incele, üstteki 🏠 ile geri dön.</p>
    <input type="text" id="searchBox" placeholder="Ara..." onkeyup="filterTiles()" class="p-2 rounded-lg w-3/4 mb-4">
    <div class="grid grid-cols-2 gap-6 w-3/4">
      <div class="menu-tile h-40 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 animate__animated animate__pulse animate__infinite" onclick="showSubMenu('stok')">
        📦 Stok Miktarları
      </div>
      <div class="menu-tile h-40 rounded-xl bg-gradient-to-r from-pink-600 to-yellow-500 animate__animated animate__pulse animate__infinite" onclick="showSubMenu('mal')">
        📥 Mal Kabul
      </div>
    </div>
  </div>

  <!-- Stok Menü -->
  <div id="stokMenu" class="hidden fade-enter h-screen flex flex-col justify-center items-center">
    <div class="grid grid-cols-2 gap-6 w-3/4">
      <div class="menu-tile h-32 rounded-xl bg-indigo-600" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=185627105&single=true')">Hammadde</div>
      <div class="menu-tile h-32 rounded-xl bg-indigo-600" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=326121089&single=true')">OPP-BOBİN</div>
      <div class="menu-tile h-32 rounded-xl bg-indigo-600" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=2101965769&single=true')">OMK-KOLİ</div>
      <div class="menu-tile h-32 rounded-xl bg-indigo-600" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=1845266626&single=true')">PET-CAM-KAPAK</div>
    </div>
  </div>

  <!-- Mal Kabul Menü -->
  <div id="malMenu" class="hidden fade-enter h-screen flex flex-col justify-center items-center">
    <div class="grid grid-cols-2 gap-6 w-3/4">
      <div class="menu-tile h-32 rounded-xl bg-purple-600" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=949894360&single=true')">Gelen Hammadde</div>
      <div class="menu-tile h-32 rounded-xl bg-purple-600" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=908017234&single=true')">Gelen Yardımcı Malzeme</div>
    </div>
  </div>

  <!-- Tablo Görüntüleme -->
  <div id="sheetView" class="hidden fade-enter mt-16 flex justify-center">
    <iframe id="sheetFrame"></iframe>
  </div>

  <!-- Loading -->
  <div id="loading" class="hidden">
    <div class="animate-spin rounded-full h-32 w-32 border-t-4 border-b-4 border-purple-500"></div>
  </div>

  <!-- JS -->
  <script>
    // Sesli karşılama
    function greetUser(){
      const hour = new Date().getHours();
      let message = "Hoş geldiniz.";
      if(hour < 12) message = "Günaydın, hoş geldiniz. Stok takibinizi kolayca yapabilirsiniz.";
      else if(hour < 18) message = "Merhaba, hoş geldiniz. Bugün stok ve mal kabul ekranlarınız hazır.";
      else message = "İyi akşamlar, hoş geldiniz. Günün son kontrolünü yapabilirsiniz.";
      const utterance = new SpeechSynthesisUtterance(message);
      utterance.lang = "tr-TR";
