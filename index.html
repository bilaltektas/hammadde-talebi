<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stok Takip Dashboard</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <!-- Custom CSS -->
  <style>
    body {
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      font-family: 'Segoe UI', sans-serif;
    }
    .menu-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }
    .menu-card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    iframe {
      border: none;
      width: 100%;
      height: 90vh;
    }
    .fade-enter {
      animation: fadeIn 0.8s;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <!-- Ana Menü -->
    <div id="mainMenu" class="animate__animated animate__fadeIn">
      <h2 class="text-center mb-4">📊 Ana Menü</h2>
      <div class="row g-3">
        <!-- Stok Miktarları -->
        <div class="col-12">
          <div class="card menu-card" onclick="showSubMenu('stok')">
            <div class="card-body text-center">
              <h4>Stok Miktarları</h4>
            </div>
          </div>
        </div>
        <!-- Mal Kabul -->
        <div class="col-12">
          <div class="card menu-card" onclick="showSubMenu('mal')">
            <div class="card-body text-center">
              <h4>Mal Kabul</h4>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Alt Menü: Stok -->
    <div id="stokMenu" class="d-none fade-enter">
      <h3 class="text-center mb-3">📦 Stok Miktarları</h3>
      <div class="list-group">
        <button class="list-group-item list-group-item-action" onclick="openPDF('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pub?gid=185627105&single=true&output=pdf')">Hammadde</button>
        <button class="list-group-item list-group-item-action" onclick="openPDF('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pub?gid=326121089&single=true&output=pdf')">OPP-BOBİN</button>
        <button class="list-group-item list-group-item-action" onclick="openPDF('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pub?gid=2101965769&single=true&output=pdf')">OMK-KOLİ</button>
        <button class="list-group-item list-group-item-action" onclick="openPDF('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pub?gid=1845266626&single=true&output=pdf')">PET-CAM-KAPAK</button>
      </div>
      <button class="btn btn-secondary mt-3" onclick="goHome()">⬅ Ana Menü</button>
    </div>

    <!-- Alt Menü: Mal Kabul -->
    <div id="malMenu" class="d-none fade-enter">
      <h3 class="text-center mb-3">📥 Mal Kabul</h3>
      <div class="list-group">
        <button class="list-group-item list-group-item-action" onclick="openPDF('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pub?gid=949894360&single=true&output=pdf')">Gelen Hammadde</button>
        <button class="list-group-item list-group-item-action" onclick="openPDF('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pub?gid=908017234&single=true&output=pdf')">Gelen Yardımcı Malzeme</button>
      </div>
      <button class="btn btn-secondary mt-3" onclick="goHome()">⬅ Ana Menü</button>
    </div>

    <!-- PDF Görüntüleme -->
    <div id="pdfView" class="d-none fade-enter">
      <h3 class="text-center mb-3">📄 PDF Görüntüleme</h3>
      <iframe id="pdfFrame"></iframe>
      <button class="btn btn-secondary mt-3" onclick="goHome()">⬅ Ana Menü</button>
    </div>
  </div>

  <!-- JS -->
  <script>
    function showSubMenu(menu){
      document.getElementById('mainMenu').classList.add('d-none');
      if(menu === 'stok'){
        document.getElementById('stokMenu').classList.remove('d-none');
      } else {
        document.getElementById('malMenu').classList.remove('d-none');
      }
    }
    function openPDF(url){
      document.getElementById('stokMenu').classList.add('d-none');
      document.getElementById('malMenu').classList.add('d-none');
      document.getElementById('pdfView').classList.remove('d-none');
      document.getElementById('pdfFrame').src = url;
    }
    function goHome(){
      document.getElementById('stokMenu').classList.add('d-none');
      document.getElementById('malMenu').classList.add('d-none');
      document.getElementById('pdfView').classList.add('d-none');
      document.getElementById('mainMenu').classList.remove('d-none');
    }
  </script>
</body>
</html>
